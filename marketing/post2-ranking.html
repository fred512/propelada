<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #0d0d0d; }
  .canvas {
    width: 1080px; height: 1080px;
    background: radial-gradient(ellipse at 50% 100%, #1a1000 0%, #0d0d0d 55%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 60px;
  }
  .tag { background: #854d0e; color: #fef08a; font-size: 20px; font-weight: 700; padding: 8px 24px; border-radius: 30px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }
  .title { font-size: 70px; font-weight: 900; color: #f9fafb; text-align: center; line-height: 1.1; margin-bottom: 12px; }
  .title span { color: #fbbf24; }
  .sub { color: #9ca3af; font-size: 26px; text-align: center; margin-bottom: 52px; }
  .podium { display: flex; align-items: flex-end; gap: 24px; margin-bottom: 52px; }
  .podium-item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .podium-item .pos { font-size: 36px; }
  .podium-item .name { color: #f9fafb; font-size: 22px; font-weight: 700; }
  .podium-item .goals { color: #fbbf24; font-size: 32px; font-weight: 900; }
  .podium-item .goals span { font-size: 18px; color: #9ca3af; }
  .bar { width: 120px; background: #1a1a1a; border-radius: 12px 12px 0 0; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; }
  .bar-1 { height: 220px; background: linear-gradient(to top, #fbbf24, #f59e0b); }
  .bar-2 { height: 160px; background: linear-gradient(to top, #9ca3af, #6b7280); }
  .bar-3 { height: 110px; background: linear-gradient(to top, #b45309, #92400e); }
  .features { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .chip { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 30px; padding: 12px 24px; color: #d1d5db; font-size: 20px; }
  .logo-bottom { color: #4ade80; font-size: 28px; font-weight: 900; margin-top: 40px; }
  .logo-bottom span { color: #6b7280; font-size: 20px; font-weight: 400; }
</style>
</head>
<body>
<div class="canvas">
  <div class="tag">🏆 Ranking ProPelada</div>
  <div class="title">Quem é o<br><span>artilheiro</span><br>da sua pelada?</div>
  <div class="sub">Ranking automático a cada partida</div>
  <div class="podium">
    <div class="podium-item">
      <div class="name">Bernardo</div>
      <div class="goals">12 <span>gols</span></div>
      <div class="bar bar-2"></div>
      <div class="pos">🥈</div>
    </div>
    <div class="podium-item">
      <div class="name">Fulaninho</div>
      <div class="goals">18 <span>gols</span></div>
      <div class="bar bar-1"></div>
      <div class="pos">🥇</div>
    </div>
    <div class="podium-item">
      <div class="name">Cebola</div>
      <div class="goals">8 <span>gols</span></div>
      <div class="bar bar-3"></div>
      <div class="pos">🥉</div>
    </div>
  </div>
  <div class="features">
    <div class="chip">Vitórias e derrotas</div>
    <div class="chip">Aproveitamento %</div>
    <div class="chip">Filtro por pelada</div>
    <div class="chip">Imprime em PDF</div>
  </div>
  <div class="logo-bottom">PR⚽PELADA <span>· propelada.com</span></div>
</div>
</body>
</html>
