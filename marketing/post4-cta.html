<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #0d0d0d; }
  .canvas {
    width: 1080px; height: 1080px;
    background: radial-gradient(ellipse at 50% 50%, #0a2e0a 0%, #0d0d0d 65%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 80px; gap: 0; text-align: center;
  }
  .emoji { font-size: 100px; margin-bottom: 24px; }
  .question { font-size: 64px; font-weight: 900; color: #f9fafb; line-height: 1.15; margin-bottom: 20px; }
  .question span { color: #4ade80; }
  .desc { color: #9ca3af; font-size: 28px; line-height: 1.6; max-width: 780px; margin-bottom: 60px; }
  .cta-box {
    background: #16a34a; border-radius: 20px; padding: 40px 80px;
    margin-bottom: 32px;
  }
  .cta-box .main { color: #fff; font-size: 44px; font-weight: 900; margin-bottom: 8px; }
  .cta-box .url { color: #bbf7d0; font-size: 28px; }
  .chips { display: flex; gap: 16px; justify-content: center; }
  .chip { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 30px; padding: 14px 28px; color: #6b7280; font-size: 22px; }
  .logo-bottom { color: #4ade80; font-size: 30px; font-weight: 900; margin-top: 40px; }
</style>
</head>
<body>
<div class="canvas">
  <div class="emoji">📱</div>
  <div class="question">Sua pelada ainda<br>usa <span>papel</span>?</div>
  <div class="desc">Gerencie tudo pelo celular: escalação, gols, substituições e ranking. Sem instalar nada.</div>
  <div class="cta-box">
    <div class="main">🚀 Comece Grátis Agora</div>
    <div class="url">propelada.com</div>
  </div>
  <div class="chips">
    <div class="chip">✓ Grátis</div>
    <div class="chip">✓ Sem app</div>
    <div class="chip">✓ No celular</div>
  </div>
  <div class="logo-bottom">PR⚽PELADA</div>
</div>
</body>
</html>
